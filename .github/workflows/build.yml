name: Build Binaries

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build (release)
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Strip binary
        run: strip target/x86_64-unknown-linux-gnu/release/hidden-service-vanity

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hidden-service-vanity-linux-x86_64
          path: target/x86_64-unknown-linux-gnu/release/hidden-service-vanity
          if-no-files-found: error

  build-windows:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build (release)
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hidden-service-vanity-windows-x86_64
          path: target/x86_64-pc-windows-msvc/release/hidden-service-vanity.exe
          if-no-files-found: error

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: hidden-service-vanity-linux-x86_64
          path: ./artifacts

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: hidden-service-vanity-windows-x86_64
          path: ./artifacts

      - name: Create release archive (Linux)
        run: |
          cd artifacts
          mv hidden-service-vanity hidden-service-vanity-linux-x86_64
          tar -czvf hidden-service-vanity-linux-x86_64.tar.gz hidden-service-vanity-linux-x86_64

      - name: Create release archive (Windows)
        run: |
          cd artifacts
          mv hidden-service-vanity.exe hidden-service-vanity-windows-x86_64.exe
          7z a hidden-service-vanity-windows-x86_64.zip hidden-service-vanity-windows-x86_64.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/hidden-service-vanity-linux-x86_64.tar.gz
            artifacts/hidden-service-vanity-windows-x86_64.zip
          generate_release_notes: true
